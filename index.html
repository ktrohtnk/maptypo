<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Letter Tracer | 道路文字ジェネレーター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css?v=5.9" />
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="logo">
        <span class="logo-icon">🗺️</span>
        <span class="logo-text">ROAD TRACER <span class="version">v5.9 Generative</span></span>
      </div>
    </header>

    <div id="main-layout">
      <!-- Controls -->
      <aside id="sidebar-left">
        <div class="sidebar-header">
          <h1 class="search-title">Map Typography</h1>
          <p class="search-desc">Generative drawing engine using real road networks.</p>
        </div>

        <div class="search-card">
          <div class="filter-group">
            <label class="filter-label">Location</label>
            <div class="input-wrap">
              <textarea id="address-input" placeholder="e.g. Fukuoka, Japan" rows="2" style="resize: vertical;">福岡市 薬院</textarea>
            </div>
          </div>

          <div class="filter-group">
            <label class="filter-label">Text</label>
            <div class="input-wrap">
              <textarea id="target-chars-input" placeholder="e.g. ARK&#10;CITY" rows="3" style="resize: vertical;">ROAD&#10;TRACER</textarea>
            </div>
          </div>

          <div class="filter-group">
            <label class="filter-label">Scale</label>
            <select id="size-select">
              <option value="200">Small (200m)</option>
              <option value="500" selected>Medium (500m)</option>
              <option value="1000">Large (1km)</option>
              <option value="2000">Huge (2km)</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-label">Theme</label>
            <select id="theme-select">
              <option value="minimal" selected>Minimal (Braun)</option>
              <option value="cyberpunk">Cyberpunk (Neon)</option>
              <option value="monochrome">Monochrome</option>
            </select>
          </div>

          <div class="filter-group">
            <label class="filter-label">Style</label>
            <select id="style-select">
              <option value="normal" selected>Normal (Separate)</option>
              <option value="connected">Connected (One-line)</option>
            </select>
          </div>

          <div class="btn-row">
            <button id="search-btn" class="primary-btn" onclick="startTrace()">
              <span id="search-btn-text">Generate</span>
              <span id="search-spinner" class="spinner hidden"></span>
            </button>
            <button id="clear-btn" class="secondary-btn" onclick="clearTrace()">Clear</button>
          </div>
          <button id="dl-btn" class="secondary-btn" style="width:100%; margin-top:8px;" onclick="downloadSVG()">⬇ Download SVG</button>
        </div>

        <div id="status-bar" class="hidden">
          <div id="status-text">Processing...</div>
          <div class="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
        </div>
      </aside>

      <!-- Map Canvas -->
      <main id="map-area">
        <div id="map"></div>
        <div id="map-overlay" class="hidden"></div>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="matcher.js?v=5.9"></script>
  <script src="app.js?v=5.9"></script>
</body>
</html>
